name: Build and Push Microservices to Docker Hub CI

on:
  push:
    branches: [ "main" ]


jobs:
  build-and-push:
    runs-on: ubuntu-latest


    steps:
  
    - name: Checkout code
      uses: actions/checkout@v4
  
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
        cache: maven
  
    - name: Build all services
      run: mvn clean package -DskipTests
  
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
  
    - name: Build & Push service-registry
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-service-registry:latest ./service-registry
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-service-registry:latest
  
    - name: Build & Push config-server
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-config-server:latest ./config-server
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-config-server:latest
  
    - name: Build & Push api-gateway
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-api-gateway:latest ./api-gateway
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-api-gateway:latest
  
    - name: Build & Push authentication-service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-auth-service:latest ./authentication-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-auth-service:latest
  
    - name: Build & Push food-service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-food-service:latest ./food-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-food-service:latest
  
    - name: Build & Push cart-service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-cart-service:latest ./cart-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-cart-service:latest
  
    - name: Build & Push contact-service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-contact-service:latest ./contact-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-contact-service:latest
  
    - name: Build & Push order-service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-order-service:latest ./order-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-order-service:latest
  
    - name: Build & Push payment-service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-payment-service:latest ./payment-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-payment-service:latest
  
    - name: Build & Push email-service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-email-service:latest ./email-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-app-microservice-email-service:latest

